; sample.ini - demo configuration for Rustiniparser

# keys before any [section] live in the global section ("")
app_name = Rustiniparser
version  = 1.0

[network]
host    = "example.com"     ; inline comment after a quoted value
port    = 8080              # works with '#' too
timeout = 30
ratio   = 0.25
mask    = 0xFF
proxy   =                   ; empty value

[server]
enabled  = yes
log_level : debug           ; ':' also separates key and value
password = 'p@ss #word ; not-a-comment'
